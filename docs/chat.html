<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iaADN — Hive Mind Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #888898;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00b894;
      --red: #e17055;
      --orange: #fdcb6e;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.4em;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-bar {
      display: flex;
      gap: 16px;
      margin-left: auto;
      font-size: 0.82em;
      color: var(--text-dim);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar h3 {
      padding: 14px 16px 8px;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .instance-card {
      margin: 4px 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.82em;
    }

    .instance-card .id {
      font-family: 'Consolas', monospace;
      color: var(--accent2);
      font-size: 0.9em;
    }

    .instance-card .meta {
      color: var(--text-dim);
      margin-top: 4px;
      display: flex;
      gap: 10px;
    }

    .fitness-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .fitness-bar .fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
      transition: width 0.3s;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.92em;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .msg-meta {
      font-size: 0.75em;
      color: var(--text-dim);
      margin-top: 6px;
      opacity: 0.7;
    }

    .message.ai .msg-meta { color: var(--text-dim); }
    .message.user .msg-meta { color: rgba(255,255,255,0.6); }

    .message.system {
      align-self: center;
      background: none;
      color: var(--text-dim);
      font-size: 0.82em;
      font-style: italic;
      padding: 4px;
    }

    .typing {
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing.active { display: flex; gap: 4px; align-items: center; }

    .typing span {
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92em;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
    }

    .input-area textarea:focus {
      border-color: var(--accent);
    }

    .input-area button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 0.92em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover { background: var(--accent2); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">iaADN</div>
  <span style="color: var(--text-dim); font-size: 0.85em;">Hive Mind</span>
  <div class="status-bar">
    <div class="status-item">
      <span class="dot green" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="status-item" id="popCount">Pop: --</div>
    <div class="status-item" id="inferenceStatus">Inference: --</div>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <h3>Population</h3>
    <div id="instanceList"></div>
    <h3 style="margin-top:16px">Lineage</h3>
    <div id="lineageStats" class="instance-card" style="color: var(--text-dim); font-size: 0.8em;">
      Loading...
    </div>
  </aside>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="message system">Connected to iaADN Hive Mind. Type a message to begin.</div>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Send a message to the hive mind..." autofocus></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(text, type, meta) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.textContent = text;
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'msg-meta';
    metaDiv.textContent = meta;
    div.appendChild(metaDiv);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage(text, 'user');
  typingEl.classList.add('active');

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const data = await res.json();

    if (data.error) {
      addMessage(data.error, 'system');
    } else {
      const meta = data.metadata
        ? `${data.metadata.mode || data.metadata.decomposition || ''} | ${data.metadata.elapsed ? data.metadata.elapsed + 'ms' : ''} | instances: ${data.metadata.instancesUsed ?? '?'}`
        : '';
      addMessage(data.response, 'ai', meta);
    }
  } catch (err) {
    addMessage(`Connection error: ${err.message}`, 'system');
  }

  typingEl.classList.remove('active');
  sendBtn.disabled = false;
  inputEl.focus();
}

// Poll status
async function refreshStatus() {
  try {
    const res = await fetch(`${API_BASE}/api/status`);
    const data = await res.json();

    document.getElementById('statusDot').className = 'dot green';
    document.getElementById('statusText').textContent = data.nodeId?.slice(0, 12) || 'Online';
    document.getElementById('popCount').textContent = `Pop: ${data.population ?? 0}`;
    document.getElementById('inferenceStatus').textContent = `Inference: ${data.inferenceReady ? 'Ready' : 'Offline'}`;

    // Render instances
    const listEl = document.getElementById('instanceList');
    if (data.instances && data.instances.length > 0) {
      listEl.innerHTML = data.instances.map(inst => `
        <div class="instance-card">
          <div class="id">${inst.id?.slice(0, 20) || '?'}</div>
          <div class="meta">
            <span>Gen ${inst.generation}</span>
            <span>${inst.specialization || 'general'}</span>
            <span>F: ${inst.fitness != null ? inst.fitness.toFixed(2) : '?'}</span>
          </div>
          <div class="fitness-bar"><div class="fill" style="width:${((inst.fitness || 0) * 100).toFixed(0)}%"></div></div>
        </div>
      `).join('');
    } else {
      listEl.innerHTML = '<div class="instance-card" style="color:var(--text-dim)">No instances</div>';
    }
  } catch {
    document.getElementById('statusDot').className = 'dot red';
    document.getElementById('statusText').textContent = 'Disconnected';
  }
}

async function refreshLineage() {
  try {
    const res = await fetch(`${API_BASE}/api/lineage`);
    const data = await res.json();
    const s = data.stats || {};
    document.getElementById('lineageStats').innerHTML = `
      Total births: ${s.totalBirths ?? 0}<br>
      Total deaths: ${s.totalDeaths ?? 0}<br>
      Living: ${s.livingCount ?? 0}<br>
      Max generation: ${s.maxGeneration ?? 0}
    `;
  } catch {
    document.getElementById('lineageStats').textContent = 'Unavailable';
  }
}

// Initial load + polling
refreshStatus();
refreshLineage();
setInterval(refreshStatus, 5000);
setInterval(refreshLineage, 15000);
</script>

</body>
</html>
